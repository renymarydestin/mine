<script>

const no = document.getElementById("no");
const yes = document.getElementById("yes");

const texts = [
    "NO 😈",
    "Are you sure? 🤔",
    "Think again! 😂",
    "Nice try 😏",
    "Still no? 😆",
    "Catch me first! 🏃",
    "You can't catch me 😜",
    "Wrong answer 😎",
    "Try harder 🤭",
    "Just press YES 😇"
];

let attempt = 0;
let yesScale = 1;

function moveButton(){

    const x = Math.random() * (window.innerWidth - 170);
    const y = Math.random() * (window.innerHeight - 80);

    no.style.left = x + "px";
    no.style.top = y + "px";

    no.innerText = texts[attempt % texts.length];

    attempt++;

    // Make YES button larger
    yesScale += 0.12;
    yes.style.transform = `scale(${yesScale})`;

    // Shrink NO button after a few tries
    if(attempt > 6){
        no.style.transform = `scale(${Math.max(0.35,1-attempt*0.04)})`;
    }

}

moveButton();

no.addEventListener("mouseenter", moveButton);

no.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveButton();
});

document.getElementById("yes").onclick = function(){

document.querySelector(".card").innerHTML = `
<h1 style="font-size:65px;">🎉 YES!! 🎉</h1>

<h2 style="margin-top:20px;">
You made the right choice 😎
</h2>

<h2 style="margin-top:25px;">
🔋 Now it's time...
</h2>

<h1 style="margin-top:20px;color:#2ecc71;">
Give me your charger!! 😂
</h1>
`;

confetti();

};


// ---------- Confetti ----------

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const colors=[
"#ff3838",
"#ffd93d",
"#2ecc71",
"#3498db",
"#9b59b6",
"#ffffff"
];

function confetti(){

let pieces=[];

for(let i=0;i<250;i++){

pieces.push({
x:window.innerWidth/2,
y:window.innerHeight/2,
dx:(Math.random()-0.5)*12,
dy:(Math.random()-0.5)*12,
life:140,
color:colors[Math.floor(Math.random()*colors.length)]
});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach((p,index)=>{

ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,8,8);

p.x+=p.dx;
p.y+=p.dy;
p.dy+=0.08;

p.life--;

if(p.life<=0){
pieces.splice(index,1);
}

});

if(pieces.length){
requestAnimationFrame(animate);
}

}

animate();

}

</script>
